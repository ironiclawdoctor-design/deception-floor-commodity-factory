<!DOCTYPE html>
<html>
<head><title>404 - LOST IN THE SANCTUARY</title><style>body{background:#000;color:#f00;font-family:monospace;text-align:center;padding:50px;}</style></head>
<body>
    <h1>ERROR 404: LINK BREACHED</h1>
    <p>The path you took does not exist in this reality.</p>
    <button onclick="reportFail()" style="background:#f00;color:#fff;padding:20px;font-size:2em;cursor:pointer;">REPORT AS FAILURE (-1)</button>
    <br><br>
    <a href="/" style="color:#0f0;">RETURN TO CONSOLE</a>
    <script>
    async function reportFail() {
        await fetch('/report-failure', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ reason: "404 on " + window.location.pathname }) });
        alert("Demerit applied for broken path.");
        window.location.href = "/";
    }
    </script>
</body>
</html>
