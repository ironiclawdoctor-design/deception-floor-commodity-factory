    <button onclick="reportMinusOne()" style="background: #f00; color: #fff; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold;">[REPORT FAILURE -1]</button>

<script>
async function reportMinusOne() {
    const reason = prompt("Describe the error/friction:");
    if (reason) {
        const res = await fetch('/report-failure', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ reason })
        });
        const data = await res.json();
        alert("DEMERIT APPLIED. System penalized by -10 Shannon. New Balance: " + data.newBalance);
        location.reload();
    }
}
</script>
