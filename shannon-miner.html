<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shannon Miner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#0f0;font-family:monospace;overflow:hidden;touch-action:none}
canvas{display:block}
#ui{position:fixed;top:10px;left:10px;font-size:14px;z-index:10}
#shop{position:fixed;bottom:10px;left:10px;font-size:12px;z-index:10}
.btn{background:#0f03;border:1px solid #0f0;color:#0f0;padding:6px 12px;margin:4px;cursor:pointer;font-family:monospace;font-size:12px}
.btn:active{background:#0f06}
#splash{position:fixed;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99}
#splash h1{font-size:28px;color:#0f0;margin-bottom:10px}
#splash p{color:#0a0;margin:5px;font-size:14px;text-align:center;max-width:300px}
</style>
</head>
<body>
<div id="splash">
<h1>⛏️ SHANNON MINER</h1>
<p>Tap entropy blocks to mine Shannon</p>
<p>Buy upgrades. Avoid red blocks (tax).</p>
<p>Fund the agency. Make Mom proud.</p>
<p style="margin-top:20px;color:#0f0">Powered by $DollarAgency</p>
<button class="btn" onclick="startGame()" style="margin-top:20px;font-size:16px;padding:10px 30px">▶ MINE</button>
</div>
<div id="ui" style="display:none">
<div>⛏️ Shannon: <span id="score">0</span></div>
<div>💎 Per tap: <span id="power">1</span></div>
<div>🔄 Auto: <span id="auto">0</span>/s</div>
<div>🏆 Level: <span id="level">1</span></div>
</div>
<div id="shop" style="display:none">
<button class="btn" id="b1" onclick="buy(1)">⛏️ Pickaxe (10S)</button>
<button class="btn" id="b2" onclick="buy(2)">🤖 Auto-miner (50S)</button>
<button class="btn" id="b3" onclick="buy(3)">💰 Donate to Agency (100S)</button>
</div>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let W,H,score=0,power=1,autoRate=0,level=1,blocks=[],particles=[],donations=0,started=false;
function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
resize();addEventListener('resize',resize);

function rng(a,b){return Math.random()*(b-a)+a}

class Block{
constructor(){
this.x=rng(30,W-30);this.y=-40;
this.w=rng(30,60);this.h=rng(30,60);
this.speed=rng(1,3)+level*0.3;
this.tax=Math.random()<0.15;
this.value=this.tax?0:Math.ceil(rng(1,5)*level);
this.color=this.tax?'#f00':'#0f0';
this.alive=true;
}
update(){this.y+=this.speed;if(this.y>H+50)this.alive=false}
draw(){
x.fillStyle=this.color+'3';x.fillRect(this.x-this.w/2,this.y-this.h/2,this.w,this.h);
x.strokeStyle=this.color;x.strokeRect(this.x-this.w/2,this.y-this.h/2,this.w,this.h);
x.fillStyle=this.color;x.font='12px monospace';x.textAlign='center';
x.fillText(this.tax?'TAX':this.value+'S',this.x,this.y+4);
}
hit(tx,ty){return tx>this.x-this.w/2&&tx<this.x+this.w/2&&ty>this.y-this.h/2&&ty<this.y+this.h/2}
}

class Particle{
constructor(px,py,col){
this.x=px;this.y=py;this.vx=rng(-3,3);this.vy=rng(-5,-1);
this.life=30;this.color=col;
}
update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.1;this.life--}
draw(){x.globalAlpha=this.life/30;x.fillStyle=this.color;x.fillRect(this.x-2,this.y-2,4,4);x.globalAlpha=1}
}

function spawnBlock(){if(blocks.length<15)blocks.push(new Block())}

function tap(e){
e.preventDefault();
let tx=e.clientX||e.touches[0].clientX,ty=e.clientY||e.touches[0].clientY;
for(let i=blocks.length-1;i>=0;i--){
let b=blocks[i];
if(b.hit(tx,ty)){
if(b.tax){
let loss=Math.ceil(score*0.1);
score=Math.max(0,score-loss);
for(let j=0;j<10;j++)particles.push(new Particle(b.x,b.y,'#f00'));
}else{
score+=b.value*power;
for(let j=0;j<8;j++)particles.push(new Particle(b.x,b.y,'#0f0'));
}
b.alive=false;
updateUI();
break;
}
}
}

function buy(n){
if(n===1&&score>=10){score-=10;power++;updateUI()}
if(n===2&&score>=50){score-=50;autoRate++;updateUI()}
if(n===3&&score>=100){score-=100;donations++;level++;updateUI()}
}

function updateUI(){
document.getElementById('score').textContent=score;
document.getElementById('power').textContent=power;
document.getElementById('auto').textContent=autoRate;
document.getElementById('level').textContent=level;
document.getElementById('b1').textContent='⛏️ Pickaxe ('+(10*power)+'S)';
document.getElementById('b2').textContent='🤖 Auto-miner ('+(50*(autoRate+1))+'S)';
document.getElementById('b3').textContent='💰 Donate (100S) ['+donations+' given]';
}

let spawnTimer=0,autoTimer=0,pickX=null,pickY=null,pickAnim=0;

function movePick(e){
pickX=e.clientX||(e.touches&&e.touches[0].clientX)||pickX;
pickY=e.clientY||(e.touches&&e.touches[0].clientY)||pickY;
}

function loop(){
if(!started)return;
x.fillStyle='#111';x.fillRect(0,0,W,H);

spawnTimer++;
if(spawnTimer>Math.max(20,60-level*3)){spawnBlock();spawnTimer=0}

autoTimer++;
if(autoTimer>60&&autoRate>0){score+=autoRate;autoTimer=0;updateUI()}

blocks=blocks.filter(b=>b.alive);
blocks.forEach(b=>{b.update();b.draw()});

particles=particles.filter(p=>p.life>0);
particles.forEach(p=>{p.update();p.draw()});

// Draw pickaxe following pointer
if(pickX!==null){
let angle=pickAnim>0?-0.4:0;
x.save();
x.translate(pickX,pickY);
x.rotate(angle);
x.font='32px monospace';
x.textAlign='center';
x.fillStyle='#fff';
x.fillText('⛏️',0,0);
x.restore();
if(pickAnim>0)pickAnim--;
}else{
// idle hint
x.fillStyle='#0f01';x.font='80px monospace';x.textAlign='center';
x.fillText('⛏️',W/2,H/2);
}

requestAnimationFrame(loop);
}

function startGame(){
document.getElementById('splash').style.display='none';
document.getElementById('ui').style.display='block';
document.getElementById('shop').style.display='block';
started=true;
c.addEventListener('click',function(e){movePick(e);pickAnim=8;tap(e)});
c.addEventListener('touchstart',function(e){movePick(e);pickAnim=8;tap(e)});
c.addEventListener('mousemove',movePick);
c.addEventListener('touchmove',function(e){e.preventDefault();movePick(e)},{passive:false});
updateUI();
loop();
}
</script>
</body>
</html>
