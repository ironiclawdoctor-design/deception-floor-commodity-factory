steps:
  # Build the Docker image from minimal context
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/sovereign-see/dollar-dashboard', '.']
    dir: '/tmp/dashboard-build'
  
  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/sovereign-see/dollar-dashboard']
  
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: ['run', 'deploy', 'dollar-dashboard', '--image=gcr.io/sovereign-see/dollar-dashboard', '--region=us-central1', '--platform=managed', '--allow-unauthenticated', '--memory=512Mi', '--cpu=1', '--max-instances=10', '--service-account=dollaragency@sovereign-see.iam.gserviceaccount.com', '--quiet']

images:
  - 'gcr.io/sovereign-see/dollar-dashboard'