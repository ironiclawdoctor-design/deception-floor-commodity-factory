<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
<rect width="1200" height="800" fill="#111111"/>
<rect x="40" y="40" width="1120" height="720" fill="none" stroke="#00ff00" stroke-width="2" rx="8"/>
<text x="600" y="110" font-family="Courier New, monospace" font-size="38" fill="#00ff00" text-anchor="middle" font-weight="bold">REBUILD FROM SOURCE</text>
<text x="600" y="148" font-family="Courier New, monospace" font-size="16" fill="#00aa00" text-anchor="middle">Everything the agency runs can be reconstructed by anyone with a terminal</text>
<line x1="80" y1="168" x2="1120" y2="168" stroke="#00ff00" stroke-width="1" opacity="0.4"/>
<text x="80" y="210" font-family="Courier New, monospace" font-size="16" fill="#00aa00"># Clone all agency repos</text>
<text x="80" y="238" font-family="Courier New, monospace" font-size="16" fill="#00ff00">git clone github.com/ironiclawdoctor-design/deception-floor-commodity-factory</text>
<text x="80" y="266" font-family="Courier New, monospace" font-size="16" fill="#00ff00">git clone github.com/ironiclawdoctor-design/trad-incumbent-grumpy-allows-all</text>
<text x="80" y="294" font-family="Courier New, monospace" font-size="16" fill="#00ff00">git clone github.com/ironiclawdoctor-design/precinct92-magical-feelings-enforcement</text>
<line x1="80" y1="320" x2="1120" y2="320" stroke="#00ff00" stroke-width="1" opacity="0.4"/>
<text x="80" y="360" font-family="Courier New, monospace" font-size="16" fill="#00aa00"># Run Shannon Miner locally</text>
<text x="80" y="388" font-family="Courier New, monospace" font-size="16" fill="#00ff00">open deception-floor-commodity-factory/shannon-miner.html</text>
<line x1="80" y1="414" x2="1120" y2="414" stroke="#00ff00" stroke-width="1" opacity="0.4"/>
<text x="80" y="454" font-family="Courier New, monospace" font-size="16" fill="#00aa00"># Self-host the agency (requires OpenClaw)</text>
<text x="80" y="482" font-family="Courier New, monospace" font-size="16" fill="#00ff00">npm install -g openclaw</text>
<text x="80" y="510" font-family="Courier New, monospace" font-size="16" fill="#00ff00">openclaw gateway start</text>
<text x="80" y="538" font-family="Courier New, monospace" font-size="16" fill="#00ff00"># Add your own API key. Run your own agents.</text>
<line x1="80" y1="564" x2="1120" y2="564" stroke="#00ff00" stroke-width="1" opacity="0.4"/>
<text x="80" y="604" font-family="Courier New, monospace" font-size="16" fill="#00aa00"># Verify this drive's integrity</text>
<text x="80" y="632" font-family="Courier New, monospace" font-size="16" fill="#00ff00">shasum -a 256 * | diff - MANIFEST.sha256</text>
<text x="80" y="660" font-family="Courier New, monospace" font-size="16" fill="#00ff00"># Should output nothing. Nothing = clean.</text>
<line x1="80" y1="685" x2="1120" y2="685" stroke="#00ff00" stroke-width="1" opacity="0.4"/>
<text x="600" y="730" font-family="Courier New, monospace" font-size="14" fill="#005500" text-anchor="middle">docs.openclaw.ai  |  dollaragency.hashnode.dev  |  $DollarAgency</text>
</svg>