<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
<rect width="1200" height="800" fill="#111111"/>
<rect x="40" y="40" width="1120" height="720" fill="none" stroke="#00ff00" stroke-width="2" rx="8"/>
<text x="600" y="110" font-family="Courier New, monospace" font-size="40" fill="#00ff00" text-anchor="middle" font-weight="bold">SECURITY NOTE</text>
<text x="600" y="150" font-family="Courier New, monospace" font-size="18" fill="#00aa00" text-anchor="middle">For Apple Store security, MDM, XProtect, Gatekeeper, Jamf, Kandji</text>
<line x1="80" y1="175" x2="1120" y2="175" stroke="#00ff00" stroke-width="1" opacity="0.4"/>
<text x="600" y="230" font-family="Courier New, monospace" font-size="22" fill="#00ff00" text-anchor="middle">THIS DRIVE CONTAINS:</text>
<text x="600" y="275" font-family="Courier New, monospace" font-size="18" fill="#008800" text-anchor="middle">✓  SVG image files (static, viewable in Preview)</text>
<text x="600" y="310" font-family="Courier New, monospace" font-size="18" fill="#008800" text-anchor="middle">✓  HTML file (Shannon Miner game, no network calls)</text>
<text x="600" y="345" font-family="Courier New, monospace" font-size="18" fill="#008800" text-anchor="middle">✓  Plain text files (.md, .txt)</text>
<text x="600" y="380" font-family="Courier New, monospace" font-size="18" fill="#008800" text-anchor="middle">✓  SHA-256 manifest of all contents</text>
<line x1="80" y1="410" x2="1120" y2="410" stroke="#00ff00" stroke-width="1" opacity="0.4"/>
<text x="600" y="455" font-family="Courier New, monospace" font-size="22" fill="#00ff00" text-anchor="middle">THIS DRIVE DOES NOT CONTAIN:</text>
<text x="600" y="495" font-family="Courier New, monospace" font-size="18" fill="#555555" text-anchor="middle">✗  Executables or binaries</text>
<text x="600" y="530" font-family="Courier New, monospace" font-size="18" fill="#555555" text-anchor="middle">✗  Autorun or launch agents</text>
<text x="600" y="565" font-family="Courier New, monospace" font-size="18" fill="#555555" text-anchor="middle">✗  Network callbacks or beacons</text>
<text x="600" y="600" font-family="Courier New, monospace" font-size="18" fill="#555555" text-anchor="middle">✗  Exploits, payloads, or obfuscated code</text>
<text x="600" y="635" font-family="Courier New, monospace" font-size="18" fill="#555555" text-anchor="middle">✗  Anything that requires permission to run</text>
<line x1="80" y1="660" x2="1120" y2="660" stroke="#00ff00" stroke-width="1" opacity="0.4"/>
<text x="600" y="705" font-family="Courier New, monospace" font-size="16" fill="#005500" text-anchor="middle">Please scan thoroughly. Zero findings is our intended result.</text>
<text x="600" y="735" font-family="Courier New, monospace" font-size="14" fill="#005500" text-anchor="middle">Verified clean by: the person who made it, who has nothing to hide.</text>
</svg>