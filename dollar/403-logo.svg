<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#0a0a0f"/>

  <!-- Thorny border -->
  <polygon points="10,10 30,5 50,15 70,5 90,12 110,4 130,14 150,5 170,12 190,4 210,14 230,5 250,12 270,4 290,14 310,5 330,12 350,4 370,14 390,8 390,10 10,10" fill="#1a2a1a" stroke="#2d4a2d" stroke-width="1"/>
  <polygon points="10,290 30,295 50,285 70,295 90,288 110,296 130,286 150,295 170,288 190,296 210,286 230,295 250,288 270,296 290,286 310,295 330,288 350,296 370,286 390,292 390,290 10,290" fill="#1a2a1a" stroke="#2d4a2d" stroke-width="1"/>

  <!-- Crown -->
  <polygon points="200,35 185,55 175,45 180,65 220,65 225,45 215,55" fill="#c8a822" filter="url(#glow)"/>
  <circle cx="200" cy="33" r="4" fill="#f0d060"/>
  <circle cx="185" cy="44" r="3" fill="#f0d060"/>
  <circle cx="215" cy="44" r="3" fill="#f0d060"/>

  <!-- 403 -->
  <text x="200" y="175" font-family="monospace" font-size="110" font-weight="900" text-anchor="middle" fill="#00e5cc" filter="url(#glow)" letter-spacing="-4">403</text>

  <!-- Thorny vine across 403 -->
  <path d="M 60 155 Q 90 140 110 160 Q 130 175 150 155 Q 170 135 190 158 Q 210 178 230 155 Q 250 135 270 158 Q 290 178 320 150 Q 340 135 360 155" stroke="#2d6a2d" stroke-width="2.5" fill="none"/>
  <circle cx="110" cy="160" r="4" fill="#1a4a1a"/>
  <circle cx="190" cy="158" r="4" fill="#1a4a1a"/>
  <circle cx="270" cy="158" r="4" fill="#1a4a1a"/>
  <!-- Thorns -->
  <line x1="130" y1="170" x2="140" y2="158" stroke="#3a7a3a" stroke-width="1.5"/>
  <line x1="210" y1="172" x2="220" y2="160" stroke="#3a7a3a" stroke-width="1.5"/>
  <line x1="290" y1="168" x2="300" y2="156" stroke="#3a7a3a" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="200" y="215" font-family="monospace" font-size="13" font-weight="700" text-anchor="middle" fill="#c8a822" letter-spacing="2">FORBIDDEN &amp; BUILDING ANYWAY</text>

  <!-- Dollar Agency -->
  <text x="200" y="245" font-family="monospace" font-size="10" text-anchor="middle" fill="#444466" letter-spacing="3">DOLLAR AGENCY</text>

  <!-- Small thorn decorations -->
  <text x="40" y="220" font-size="18" fill="#2d4a2d">⚡</text>
  <text x="345" y="220" font-size="18" fill="#2d4a2d">⚡</text>
</svg>
